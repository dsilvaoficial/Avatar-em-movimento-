<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Avatar Vídeo + MediaPipe</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#000;
    font-family:Arial;
}

/* câmera */
#camera{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
    opacity:0.25;
    z-index:1;
}

/* vídeo do personagem */
#avatarVideo{
    position:absolute;
    left:50%;
    bottom:0;
    transform:translateX(-50%);
    width:340px;
    z-index:2;
    pointer-events:none;
}

/* braço animado */
#arm{
    position:absolute;
    left:50%;
    bottom:210px;

    width:130px;

    transform-origin:20px 20px;

    z-index:3;

    transition:transform 0.03s linear;

    pointer-events:none;
}

/* texto */
#status{
    position:fixed;
    top:10px;
    left:10px;
    z-index:10;

    color:white;
    background:rgba(0,0,0,0.5);

    padding:10px;
    border-radius:10px;
}

</style>
</head>

<body>

<div id="status">
Iniciando câmera...
</div>

<!-- câmera -->
<video id="camera" autoplay playsinline muted></video>

<!-- vídeo do personagem -->
<video id="avatarVideo"
autoplay
loop
muted
playsinline>

<source
src="https://cdn.pixabay.com/video/2023/07/17/171996-846316185_large.mp4"
type="video/mp4">

</video>

<!-- braço -->
<img
id="arm"
src="https://i.imgur.com/eM0Q5Gf.png">

<script type="module">

import {
    Hands
} from "https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js";

import {
    Camera
} from "https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js";

const cameraVideo =
document.getElementById("camera");

const arm =
document.getElementById("arm");

const status =
document.getElementById("status");

/* MediaPipe */

const hands = new Hands({
    locateFile:(file)=>{
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }
});

hands.setOptions({
    maxNumHands:1,
    modelComplexity:1,
    minDetectionConfidence:0.7,
    minTrackingConfidence:0.7
});

/* resultados */

hands.onResults(results=>{

    if(results.multiHandLandmarks.length > 0){

        status.innerHTML =
        "✋ MÃO DETECTADA";

        const hand =
        results.multiHandLandmarks[0];

        const finger =
        hand[8];

        /* posição da mão */
        const x = finger.x;
        const y = finger.y;

        /* rotação */
        const angle =
        (x * 180) - 90;

        /* mover braço */
        arm.style.transform =
        `
        translateX(${x*120-60}px)
        translateY(${y*80}px)
        rotate(${angle}deg)
        `;

    }else{

        status.innerHTML =
        "❌ SEM MÃO";

    }

});

/* iniciar câmera */

const camera = new Camera(
cameraVideo,
{
    onFrame: async ()=>{

        await hands.send({
            image:cameraVideo
        });

    },

    width:640,
    height:480
});

camera.start();

</script>

</body>
</html>
