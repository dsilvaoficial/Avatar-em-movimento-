<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Avatar MediaPipe</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
    font-family:Arial;
}

video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
    opacity:0.25;
}

#avatar{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:320px;
    pointer-events:none;
}

#body{
    width:100%;
}

#arm{
    position:absolute;
    width:130px;
    left:170px;
    top:110px;

    transform-origin:20px 20px;
    transition:transform 0.03s linear;
}

#info{
    position:fixed;
    top:10px;
    left:10px;
    color:white;
    z-index:10;
    background:rgba(0,0,0,0.5);
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div id="info">
Mova sua mão ✋
</div>

<video id="video" autoplay playsinline></video>

<div id="avatar">

    <!-- Corpo -->
    <img id="body"
    src="https://i.imgur.com/y0QZB8X.png">

    <!-- Braço -->
    <img id="arm"
    src="https://i.imgur.com/eM0Q5Gf.png">

</div>

<script type="module">

import {
    Hands
} from "https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js";

import {
    Camera
} from "https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js";

const video = document.getElementById("video");
const arm = document.getElementById("arm");

const hands = new Hands({
    locateFile: (file)=>{
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }
});

hands.setOptions({
    maxNumHands:1,
    modelComplexity:1,
    minDetectionConfidence:0.7,
    minTrackingConfidence:0.7
});

hands.onResults(results=>{

    if(results.multiHandLandmarks.length > 0){

        const hand = results.multiHandLandmarks[0];

        // dedo indicador
        const indexFinger = hand[8];

        // posição horizontal
        const x = indexFinger.x;

        // converte para ângulo
        const angle = (x * 180) - 90;

        arm.style.transform =
        `rotate(${angle}deg)`;

    }

});

const camera = new Camera(video,{
    onFrame: async ()=>{
        await hands.send({image:video});
    },
    width:640,
    height:480
});

camera.start();

</script>

</body>
</html>
